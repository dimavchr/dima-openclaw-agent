# OpenClaw Fly.io deployment configuration
# See https://fly.io/docs/reference/configuration/

app = "openclaw-dima-assistant"
primary_region = "fra"

[build]
  image = "ghcr.io/openclaw/openclaw:latest"

[env]
  NODE_ENV = "production"
  OPENCLAW_STATE_DIR = "/data"
  NODE_OPTIONS = "--max-old-space-size=1536"
  OPENCLAW_GATEWAY_CONTROLUI_ALLOWEDORIGINS = '["https://openclaw-dima-assistant.fly.dev"]'
  
[processes]
  app = "sh -c 'chown -R 1000 /data && exec node dist/index.js gateway --allow-unconfigured --port 3000 --bind lan'"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off" # Keep running 24/7 as a proactive agent
  auto_start_machines = true
  processes = ["app"]

[mounts]
  source = "openclaw_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-2x"
  memory = "2048mb"
